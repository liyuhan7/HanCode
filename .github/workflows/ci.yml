name: CI

on:
  push:
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --disable-pip-version-check "uv==0.11.8"

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run quality gates
        run: |
          uv run pytest
          uv run ruff check src tests scripts
          uv run mypy src

      - name: Build and smoke test distribution
        run: |
          uv build
          uv run hancode --help
          uv run hancode demo --provider mock

      - name: Install and smoke test built wheel
        run: |
          wheel_venv="$RUNNER_TEMP/hancode-wheel-venv"
          uv venv "$wheel_venv" --python 3.11
          uv pip install --python "$wheel_venv/bin/python" dist/*.whl
          "$wheel_venv/bin/hancode" --help
          "$wheel_venv/bin/hancode" demo --provider mock
